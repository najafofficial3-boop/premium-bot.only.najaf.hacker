<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVIATOR AI PREDICTOR PREMIUM</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #ffffff; text-align: center; margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 500px; background: #1e1e1e; margin: 30px auto; padding: 30px; border-radius: 15px; border: 1px solid #ff0055; box-shadow: 0 8px 24px rgba(255, 0, 0, 0.2); }
        h1 { color: #ff0055; font-size: 24px; text-shadow: 0 0 10px rgba(255, 0, 85, 0.5); }
        .hidden { display: none !important; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #bbb; }
        input { width: 90%; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 10px; text-align: center; font-size: 16px; }
        input:focus { border-color: #ff0055; outline: none; }
        button { width: 95%; padding: 14px; background: linear-gradient(45deg, #ff0055, #990033); border: none; color: white; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { transform: scale(1.02); }
        .result-box { margin-top: 25px; padding: 20px; background: #252525; border-radius: 10px; border-left: 5px solid #ff0055; border-right: 5px solid #ff0055; font-size: 18px; font-weight: bold; }
        .footer-links { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .footer-links a { display: inline-block; color: #00ffcc; text-decoration: none; margin: 10px; background: #2a2a2a; padding: 8px 15px; border-radius: 5px; border: 1px solid #00ffcc; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Section -->
    <div id="loginSection">
        <h1>✈️ AVIATOR AI PREDICTOR PREMIUM ✈️</h1>
        <p style="color: #aaa;">لاگ ان پاسورڈ درج کریں</p>
        <input type="password" id="passInput" placeholder="پاسورڈ یہاں لکھیں">
        <button onclick="checkPassword()">لاگ ان کریں</button>
    </div>

    <!-- Main App Section -->
    <div id="appSection" class="hidden">
        <h1>✈️ AVIATOR AI PREDICTOR PREMIUM ✈️</h1>
        <p style="color: #00ffcc; font-weight: bold;">[اسٹریٹیجی پریڈکشن کیلکولیٹر AI]</p>
        
        <label>پچھلا آخری نمبر درج کریں (Last Round Number):</label>
        <input type="number" step="0.01" id="num1" placeholder="مثال: 1.85">
        
        <button onclick="calculatePrediction()">اگلا چانس نکالیں</button>
        <div id="resultDisplay" class="result-box hidden"></div>
    </div>

    <!-- Contact & Promotional Links Section -->
    <div class="footer-links">
        <!-- Game Link Button -->
        <a href="https://www.92lotto.bet/#/register?invitationCode=281421172641" target="_blank">🔗 گیم لنک</a>
        
        <!-- Custom Message & WhatsApp Contact -->
        <p style="color: #ffcc00; font-size: 15px; margin-top: 15px; font-weight: bold;">
            agar kisi ko chahiye to idr rabta kare 👇
        </p>
        <a href="https://wa.me/923296024644" target="_blank" style="border-color: #25D366; color: #25D366;">💬 WhatsApp رابطہ</a>
    </div>
</div>

<script>
    // Configuration Settings
    const PASSWORD_REQUIRED = "2786";

    // Password Validation
    function checkPassword() {
        if (document.getElementById("passInput").value === PASSWORD_REQUIRED) {
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("appSection").classList.remove("hidden");
        } else {
            alert("❌ غلط پاسورڈ درج کیا گیا ہے۔");
        }
    }

    // New 1-Round History Prediction Formula
    function calculatePrediction() {
        const n1 = parseFloat(document.getElementById("num1").value);

        if (isNaN(n1)) {
            alert("براہ کرم خانوں میں صحیح ہندسہ درج کریں۔");
            return;
        }

        // 1 Round AI Simulation Multiplier Calculation
        let next_val = Math.round((n1 * 1.35) * 100) / 100;
        
        // Base limits to keep prediction realistic
        if (next_val < 1.10) {
            next_val = 1.25;
        } else if (next_val > 8.0) {
            next_val = Math.round((2.15 + Math.random()) * 100) / 100;
        }

        const resultBox = document.getElementById("resultDisplay");
        resultBox.classList.remove("hidden");
        
        if (next_val > 2.0) {
            resultBox.innerHTML = `💡 متوقع اگلا چانس (Predicted X): <span style="color: #00ff00; font-size: 24px;">${next_val}x</span><br><span style="color: #ffcc00; font-size: 14px;">🔥 بڑا گراف آنے کا امکان ہے۔</span>`;
        } else {
            resultBox.innerHTML = `💡 متوقع اگلا چانس (Predicted X): <span style="color: #ffcc00; font-size: 24px;">${next_val}x</span><br><span style="color: #00ffcc; font-size: 14px;">🛡️ گراف نارمل رہنے کا امکان ہے۔</span>`;
        }
    }
</script>

</body>
</html>
